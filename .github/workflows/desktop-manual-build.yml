name: Manual Desktop Build

on:
  workflow_dispatch:
    inputs:
      target_os:
        description: "Desktop target OS"
        required: true
        type: choice
        default: win32
        options:
          - win32
          - darwin
          - linux
      target_arch:
        description: "Desktop target architecture"
        required: true
        type: choice
        default: x64
        options:
          - x64
          - arm64
      release_tag:
        description: "Optional release tag to attach artifacts to"
        required: false
        type: string
      runtime_release_tag:
        description: "Optional runtime release tag embedded into the desktop app"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-manual-${{ github.event.inputs.target_os }}-${{ github.event.inputs.target_arch }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.target.outputs.label }}
      runner: ${{ steps.target.outputs.runner }}
      target_os: ${{ steps.target.outputs.target_os }}
      target_arch: ${{ steps.target.outputs.target_arch }}
      electron_target: ${{ steps.target.outputs.electron_target }}
      artifact_name: ${{ steps.target.outputs.artifact_name }}
      artifact_files: ${{ steps.target.outputs.artifact_files }}
    steps:
      - name: Select requested target
        id: target
        shell: bash
        run: |
          write_common_outputs() {
            {
              echo "label=$1"
              echo "runner=$2"
              echo "target_os=${{ github.event.inputs.target_os }}"
              echo "target_arch=${{ github.event.inputs.target_arch }}"
              echo "electron_target=$3"
              echo "artifact_name=$4"
              echo "artifact_files<<EOF"
              shift 4
              printf '%s\n' "$@"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          }

          case "${{ github.event.inputs.target_os }}-${{ github.event.inputs.target_arch }}" in
            win32-x64)
              write_common_outputs "Windows x64" "windows-latest" "--win nsis --x64" "desktop-win32-x64" \
                "packages/desktop/release/*.exe" \
                "packages/desktop/release/*.exe.blockmap" \
                "packages/desktop/release/latest*.yml"
              ;;
            darwin-arm64)
              write_common_outputs "macOS arm64" "macos-14" "--mac dmg zip --arm64" "desktop-darwin-arm64" \
                "packages/desktop/release/*.dmg" \
                "packages/desktop/release/*.dmg.blockmap" \
                "packages/desktop/release/*.zip" \
                "packages/desktop/release/*.zip.blockmap"
              ;;
            darwin-x64)
              write_common_outputs "macOS x64" "macos-15-intel" "--mac dmg zip --x64" "desktop-darwin-x64" \
                "packages/desktop/release/*.dmg" \
                "packages/desktop/release/*.dmg.blockmap" \
                "packages/desktop/release/*.zip" \
                "packages/desktop/release/*.zip.blockmap"
              ;;
            linux-x64)
              write_common_outputs "Linux x64" "ubuntu-22.04" "--linux AppImage deb --x64" "desktop-linux-x64" \
                "packages/desktop/release/*.AppImage" \
                "packages/desktop/release/*.deb" \
                "packages/desktop/release/latest*.yml"
              ;;
            linux-arm64)
              write_common_outputs "Linux arm64" "ubuntu-22.04-arm" "--linux AppImage --arm64" "desktop-linux-arm64" \
                "packages/desktop/release/*.AppImage" \
                "packages/desktop/release/latest*.yml"
              ;;
            *)
              echo "Unsupported desktop target: ${{ github.event.inputs.target_os }} ${{ github.event.inputs.target_arch }}" >&2
              exit 1
              ;;
          esac

  desktop:
    name: Desktop (${{ needs.validate.outputs.label }})
    needs: validate
    runs-on: ${{ needs.validate.outputs.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/desktop/package-lock.json

      - name: Install web UI dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild node-pty

      - name: Build web UI
        run: npm run build

      - name: Keep production web UI dependencies only
        run: npm prune --omit=dev --no-audit --no-fund

      - name: Install desktop dependencies
        run: npm ci --prefix packages/desktop --no-audit --no-fund

      - name: Write runtime release metadata
        shell: bash
        env:
          RUNTIME_RELEASE_TAG: ${{ github.event.inputs.runtime_release_tag }}
        run: npm --prefix packages/desktop run write:runtime-release

      - name: Configure macOS signing
        if: needs.validate.outputs.target_os == 'darwin'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          MAC_APPLE_ID: ${{ secrets.APPLE_ID }}
          MAC_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MAC_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          write_env() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              {
                echo "$name<<EOF"
                echo "$value"
                echo "EOF"
              } >> "$GITHUB_ENV"
            fi
          }

          if [ -z "${MAC_CSC_LINK:-}" ]; then
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "MAC_BUILD_EXTRA_ARGS=--config.mac.notarize=false" >> "$GITHUB_ENV"
            echo "No macOS signing certificate configured; building unsigned and skipping notarization."
            exit 0
          fi

          write_env "CSC_LINK" "$MAC_CSC_LINK"
          write_env "CSC_KEY_PASSWORD" "$MAC_CSC_KEY_PASSWORD"

          if [ -n "${MAC_APPLE_ID:-}" ] && [ -n "${MAC_APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${MAC_APPLE_TEAM_ID:-}" ]; then
            write_env "APPLE_ID" "$MAC_APPLE_ID"
            write_env "APPLE_APP_SPECIFIC_PASSWORD" "$MAC_APPLE_APP_SPECIFIC_PASSWORD"
            write_env "APPLE_TEAM_ID" "$MAC_APPLE_TEAM_ID"
            echo "macOS signing and notarization are configured."
          else
            echo "MAC_BUILD_EXTRA_ARGS=--config.mac.notarize=false" >> "$GITHUB_ENV"
            echo "macOS signing certificate configured; Apple notarization credentials incomplete, skipping notarization."
          fi

      - name: Build desktop artifact
        shell: bash
        run: |
          if [ "${{ needs.validate.outputs.target_os }}" = "darwin" ]; then
            ulimit -n 10240 || true
            echo "File descriptor limit: $(ulimit -n)"
          fi
          npm --prefix packages/desktop run dist -- ${{ needs.validate.outputs.electron_target }} ${MAC_BUILD_EXTRA_ARGS:-} --publish never

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.validate.outputs.artifact_name }}
          path: ${{ needs.validate.outputs.artifact_files }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload artifacts to release
        if: github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          fail_on_unmatched_files: true
          files: ${{ needs.validate.outputs.artifact_files }}

      - name: Upload artifacts to R2
        if: github.event.inputs.release_tag != ''
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_PREFIX: ${{ github.event.inputs.release_tag }}
          R2_FILES: ${{ needs.validate.outputs.artifact_files }}
        run: bash scripts/upload-r2-artifacts.sh

  mac-update-manifest:
    name: Repair macOS update manifest
    needs: [validate, desktop]
    if: needs.validate.outputs.target_os == 'darwin' && github.event.inputs.release_tag != ''
    runs-on: ubuntu-22.04
    steps:
      - name: Check macOS release asset completeness
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          assets="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          missing=0
          for pattern in \
            '^Hermes\.Studio-.+-arm64\.zip$' \
            '^Hermes\.Studio-.+-arm64\.dmg$' \
            '^Hermes\.Studio-.+-x64\.zip$' \
            '^Hermes\.Studio-.+-x64\.dmg$'
          do
            if ! printf '%s\n' "$assets" | grep -E "$pattern" >/dev/null; then
              missing=1
              echo "Missing macOS release asset matching ${pattern}"
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "complete=true" >> "$GITHUB_OUTPUT"
          else
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "Both macOS architectures are not available yet; leaving latest-mac.yml unchanged."
          fi

      - name: Download macOS release assets
        if: steps.check.outputs.complete == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/hermes-mac-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern 'Hermes.Studio-*-arm64.zip' --dir /tmp/hermes-mac-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern 'Hermes.Studio-*-arm64.dmg' --dir /tmp/hermes-mac-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern 'Hermes.Studio-*-x64.zip' --dir /tmp/hermes-mac-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern 'Hermes.Studio-*-x64.dmg' --dir /tmp/hermes-mac-assets
          ls -lh /tmp/hermes-mac-assets

      - name: Generate merged latest-mac.yml
        if: steps.check.outputs.complete == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const { createHash } = require('node:crypto')
          const { readdirSync, readFileSync, statSync, writeFileSync } = require('node:fs')
          const { join } = require('node:path')

          const dir = '/tmp/hermes-mac-assets'
          const names = readdirSync(dir)
          const byKey = new Map()
          let version = null

          for (const name of names) {
            const match = /^Hermes\.Studio-(.+)-(arm64|x64)\.(zip|dmg)$/.exec(name)
            if (!match) continue
            if (version && version !== match[1]) {
              throw new Error(`Mixed macOS asset versions: ${version} and ${match[1]}`)
            }
            version = match[1]
            byKey.set(`${match[2]}.${match[3]}`, name)
          }

          if (!version) throw new Error('No macOS release assets found')

          const order = ['arm64.zip', 'arm64.dmg', 'x64.zip', 'x64.dmg']
          const missing = order.filter(key => !byKey.has(key))
          if (missing.length > 0) {
            throw new Error(`Missing macOS release assets: ${missing.join(', ')}`)
          }

          const entries = order.map(key => {
            const name = byKey.get(key)
            const file = join(dir, name)
            return {
              url: name,
              sha512: createHash('sha512').update(readFileSync(file)).digest('base64'),
              size: statSync(file).size,
            }
          })

          const head = entries[0]
          const lines = [`version: ${version}`, 'files:']
          for (const entry of entries) {
            lines.push(`  - url: ${entry.url}`)
            lines.push(`    sha512: ${entry.sha512}`)
            lines.push(`    size: ${entry.size}`)
          }
          lines.push(`path: ${head.url}`)
          lines.push(`sha512: ${head.sha512}`)
          lines.push(`releaseDate: '${new Date().toISOString()}'`)
          writeFileSync('/tmp/latest-mac.yml', `${lines.join('\n')}\n`)
          NODE
          cat /tmp/latest-mac.yml

      - name: Upload merged macOS update manifest to release
        if: steps.check.outputs.complete == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" /tmp/latest-mac.yml --repo "$GITHUB_REPOSITORY" --clobber

      - name: Upload merged macOS update manifest to R2
        if: steps.check.outputs.complete == 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_PREFIX: ${{ github.event.inputs.release_tag }}
          R2_FILES: /tmp/latest-mac.yml
        run: bash scripts/upload-r2-artifacts.sh
